<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta
    name="viewport"
    content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover"
  >
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="PVHS Countdown">
  <meta name="theme-color" content="#007474">
  <link rel="apple-touch-icon" href="PV_Logo.png?v=6">
  <link rel="icon" type="image/png" sizes="192x192" href="PV_Logo.png?v=6">
  <link rel="icon" type="image/png" sizes="512x512" href="PV_Logo.png?v=6">
  <link rel="shortcut icon" href="PV_Logo.png?v=6">
  <title>PVHS School Days Countdown</title>
  <style>
    :root {
      --teal: #007474;
      --white: #f7fbfb;
      --muted: #cfe3e3;
      --shadow: 0 20px 46px rgba(0,0,0,0.28);
      --soft-shadow: 0 12px 24px rgba(0,0,0,0.20);
      --white-gradient: linear-gradient(180deg, #ffffff 0%, #dceaea 100%);
    }

    * {
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }

    html,
    body {
      width: 100%;
      height: 100%;
      min-height: 100%;
      margin: 0;
      padding: 0;
      overflow: hidden;
      background: transparent;
    }

    body {
      font-family: Arial, Helvetica, sans-serif;
      color: var(--white);
    }

    .frame {
      width: 100vw;
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      background: transparent;
    }

    .app {
      width: 100vmin;
      height: 100vmin;
      max-width: 100vw;
      max-height: 100vh;
      border-radius: 32px;
      overflow: hidden;
      position: relative;
      box-shadow: var(--shadow);
      border: 1px solid rgba(255,255,255,0.14);
      background:
        radial-gradient(circle at center, rgba(7,34,34,0.92) 0%, rgba(3,26,26,0.96) 48%, rgba(0,116,116,1) 100%);
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 28px 24px;
      text-align: center;
      isolation: isolate;
    }

    .app::before {
      content: "";
      position: absolute;
      inset: 0;
      pointer-events: none;
      background:
        radial-gradient(circle at center, rgba(255,255,255,0.08) 0%, transparent 36%),
        radial-gradient(circle at top, rgba(0,116,116,0.30) 0%, transparent 45%);
      z-index: 0;
    }

    .content {
      position: relative;
      z-index: 1;
      width: 100%;
      max-width: 720px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100%;
    }

    .logo {
      width: min(18vw, 120px);
      max-width: 120px;
      height: auto;
      object-fit: contain;
      filter: drop-shadow(0 10px 22px rgba(0,0,0,0.28));
      margin-bottom: 18px;
    }

    .count-card {
      width: 100%;
      max-width: 560px;
      border-radius: 30px;
      padding: 26px 24px 22px 24px;
      background: rgba(255,255,255,0.08);
      border: 1px solid rgba(255,255,255,0.12);
      box-shadow: var(--soft-shadow);
      backdrop-filter: blur(4px);
      -webkit-backdrop-filter: blur(4px);
      margin-bottom: 24px;
    }

    .count-label {
      font-size: clamp(22px, 3vw, 34px);
      font-weight: 900;
      color: #ffffff;
      margin-bottom: 10px;
      text-transform: uppercase;
      letter-spacing: 0.8px;
      line-height: 1.05;
    }

    .count-number {
      font-size: clamp(120px, 21vw, 220px);
      line-height: 0.9;
      font-weight: 900;
      letter-spacing: -5px;
      margin: 0;
      background: var(--white-gradient);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
      text-shadow: 0 6px 18px rgba(0,0,0,0.18);
    }

    .detail-row {
      font-size: clamp(16px, 2vw, 24px);
      line-height: 1.4;
      color: #d9f2f2;
      margin: 0 0 14px 0;
      max-width: 700px;
      font-weight: 800;
    }

    .detail-row strong {
      color: #ffffff;
    }

    .footer-note {
      margin-top: auto;
      font-size: 16px;
      line-height: 1.35;
      color: #b5d4d4;
      max-width: 320px;
      text-transform: uppercase;
      font-weight: 700;
    }

    @media (max-aspect-ratio: 1/1) {
      .app {
        width: 100vw;
        height: 100vw;
        max-width: 100vw;
        max-height: 100vw;
        border-radius: 28px;
        padding: 22px 16px;
      }

      .logo {
        width: min(28vw, 120px);
        max-width: 120px;
        margin-bottom: 14px;
      }

      .count-card {
        max-width: 92%;
        padding: 22px 16px 18px 16px;
        border-radius: 26px;
        margin-bottom: 20px;
      }

      .count-label {
        font-size: clamp(18px, 3.8vw, 24px);
      }

      .count-number {
        font-size: clamp(92px, 24vw, 150px);
        letter-spacing: -3px;
      }

      .detail-row {
        font-size: 15px;
        line-height: 1.45;
        max-width: 92%;
      }

      .footer-note {
        font-size: 14px;
      }
    }
  </style>
</head>
<body>
  <div class="frame">
    <div class="app">
      <div class="content">
        <img src="PV_Logo.png" alt="Pioneer Valley High School logo" class="logo">

        <div class="count-card">
          <div class="count-label">School Days Left</div>
          <div class="count-number" id="daysLeft">--</div>
        </div>

        <p class="detail-row">
          <strong id="todayLabel">Today:</strong> <span id="todayText">--</span>
          &nbsp;&nbsp;&nbsp;
          <strong>Last Day:</strong> June 10, 2026
        </p>

        <div class="footer-note">
          Created By: Mr. Silva
        </div>
      </div>
    </div>
  </div>

  <script>
    const schoolDays = [
      "2026-03-13",
      "2026-03-17","2026-03-18","2026-03-19","2026-03-20",
      "2026-03-24","2026-03-25","2026-03-26","2026-03-27",
      "2026-03-31",

      "2026-04-01","2026-04-02",
      "2026-04-14","2026-04-15","2026-04-16","2026-04-17",
      "2026-04-21","2026-04-22","2026-04-23","2026-04-24",
      "2026-04-28","2026-04-29","2026-04-30",

      "2026-05-01","2026-05-05","2026-05-06","2026-05-07","2026-05-08",
      "2026-05-12","2026-05-13","2026-05-14","2026-05-15",
      "2026-05-19","2026-05-20","2026-05-21","2026-05-22",
      "2026-05-26","2026-05-27","2026-05-28","2026-05-29",

      "2026-06-02","2026-06-03","2026-06-04","2026-06-05",
      "2026-06-08","2026-06-09","2026-06-10"
    ];

    const minimumDays = new Set([
      "2026-03-30",
      "2026-04-02",
      "2026-04-24",
      "2026-06-10"
    ]);

    const finalsDays = new Set([
      "2026-06-08",
      "2026-06-09",
      "2026-06-10"
    ]);

    const timeZone = "America/Los_Angeles";

    function getCaliforniaDateString() {
      const now = new Date();
      const formatter = new Intl.DateTimeFormat("en-CA", {
        timeZone,
        year: "numeric",
        month: "2-digit",
        day: "2-digit"
      });
      return formatter.format(now);
    }

    function formatLongDate(dateString) {
      const [year, month, day] = dateString.split("-").map(Number);
      const date = new Date(year, month - 1, day);
      return new Intl.DateTimeFormat("en-US", {
        timeZone,
        weekday: "long",
        month: "long",
        day: "numeric",
        year: "numeric"
      }).format(date);
    }

    function getTodayLabel(dateString) {
      if (finalsDays.has(dateString)) {
        return "Today (Finals):";
      }
      if (minimumDays.has(dateString)) {
        return "Today (Minimum Day):";
      }
      return "Today:";
    }

    function updateCountdown() {
      const todayString = getCaliforniaDateString();
      const daysLeft = schoolDays.filter(day => day >= todayString).length;

      document.getElementById("daysLeft").textContent = daysLeft;
      document.getElementById("todayLabel").textContent = getTodayLabel(todayString);
      document.getElementById("todayText").textContent = formatLongDate(todayString);
    }

    updateCountdown();
  </script>
</body>
</html>
